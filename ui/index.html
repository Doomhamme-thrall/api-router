<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LLM Router Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --bg-2: #161822;
      --bg-3: #1c1f2e;
      --card: #1a1d2e;
      --card-hover: #1f2337;
      --border: #2a2d3e;
      --border-light: #353849;
      --ink: #e2e4ed;
      --ink-2: #a0a4b8;
      --muted: #6b7089;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-bg: rgba(99,102,241,0.12);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.12);
      --ok: #22c55e;
      --ok-bg: rgba(34,197,94,0.12);
      --warn: #f59e0b;
      --warn-bg: rgba(245,158,11,0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --sidebar-w: 220px;
      --header-h: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", -apple-system, sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }
    input, select, textarea {
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select { cursor: pointer; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--ink-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-3); border-color: var(--border-light); }
    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon {
      width: 32px; height: 32px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
    }

    /* ── Login ── */
    #loginView {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .login-card .field + .field { margin-top: 12px; }
    .login-card .login-status {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }
    .login-card button { width: 100%; margin-top: 16px; justify-content: center; }

    /* ── App Layout ── */
    #appView { display: none; min-height: 100vh; }
    .app-layout {
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      z-index: 10;
    }
    .sidebar-brand {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .sidebar-brand .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .sidebar-nav { flex: 1; padding: 10px 8px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--ink-2);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: all .12s;
    }
    .nav-item:hover { background: var(--bg-3); color: var(--ink); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    /* Main content */
    .main {
      margin-left: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--bg-2);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 600;
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .content {
      flex: 1;
      padding: 24px;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Status bar */
    .status-bar {
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      padding: 6px 0;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .card + .card { margin-top: 12px; }

    /* Target/Group compact card */
    .item-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .15s;
    }
    .item-card:hover { border-color: var(--border-light); }
    .item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }
    .item-header:hover { background: var(--card-hover); }
    .item-name {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-id {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .item-chevron {
      width: 18px; height: 18px; color: var(--muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .item-card.expanded .item-chevron { transform: rotate(90deg); }
    .item-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }
    .item-card.expanded .item-body { display: block; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .pill-on { background: var(--ok-bg); color: var(--ok); }
    .pill-off { background: var(--warn-bg); color: var(--warn); }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .item-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .test-result {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      background: var(--bg-2);
      display: none;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .2s ease;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      animation: fadeUp .25s ease;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    /* Picker */
    .picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }
    .pick-item {
      display: flex;
      gap: 6px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .12s;
    }
    .pick-item:hover { border-color: var(--border-light); }
    .pick-item input { width: auto; margin: 0; cursor: pointer; }
    .pick-item span { color: var(--ink-2); }

    /* Stats table */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .stats-table th {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .stats-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }
    .stats-table tbody tr:hover { background: var(--card-hover); }
    .stats-table tbody tr:last-child td { border-bottom: none; }

    /* Stats filters */
    .stats-filters {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stats-filters .field { min-width: 160px; }
    .custom-range {
      display: none;
      gap: 10px;
      margin-bottom: 16px;
    }
    .custom-range.visible { display: flex; }

    /* Token usage bar */
    .bar-bg {
      height: 6px;
      background: var(--bg-2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 3px;
      transition: width .4s ease;
    }

    /* Stats list layout */
    .stats-list .stats-row:hover { background: transparent; }
    .stats-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: border-color .15s;
    }
    .stats-item:hover { border-color: var(--border-light); }
    .stats-main {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stats-rank {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      min-width: 28px;
    }
    .stats-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--ink);
      flex: 1;
      min-width: 120px;
    }
    .stats-metric {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--ink-2);
    }
    .stats-metric.ok { color: var(--ok); }
    .stats-metric.err { color: var(--danger); }
    .stats-total {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: .4; }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      animation: slideIn .25s ease;
      max-width: 360px;
    }
    .toast.ok { border-left: 3px solid var(--ok); }
    .toast.err { border-left: 3px solid var(--danger); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Mono */
    .mono { font-family: "JetBrains Mono", monospace; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .field-grid { grid-template-columns: 1fr; }
      .picker { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginView">
    <div class="login-card">
      <h1>LLM Router</h1>
      <div class="sub">Sign in to manage your router</div>
      <div class="field">
        <label>Username</label>
        <input id="username" value="admin" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="admin123" />
      </div>
      <button class="btn-primary" onclick="login()">Sign In</button>
      <div id="loginStatus" class="login-status">Not logged in</div>
    </div>
  </div>

  <!-- App -->
  <div id="appView">
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h1>LLM Router</h1>
          <div class="sub">Round-Robin Proxy</div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-tab="targets" onclick="showTab('targets')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M8 12h8M12 8v8"/></svg>
            Targets
          </button>
          <button class="nav-item" data-tab="groups" onclick="showTab('groups')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            Model Groups
          </button>
          <button class="nav-item" data-tab="stats" onclick="showTab('stats')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            Usage Stats
          </button>
        </nav>
        <div class="sidebar-footer">
          <button class="btn-ghost btn-sm" style="width:100%;" onclick="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Sign Out
          </button>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar-title" id="topbarTitle">Targets</div>
          <div class="topbar-actions">
            <button class="btn-ghost btn-sm" onclick="refreshAll()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
              Refresh
            </button>
            <button class="btn-primary btn-sm" id="addBtn" onclick="openAddModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              Add
            </button>
          </div>
        </header>

        <!-- Content -->
        <div class="content">
          <div class="status-bar" id="appStatus">Ready</div>

          <!-- Targets tab -->
          <div id="tab-targets">
            <div id="targetsList"></div>
          </div>

          <!-- Groups tab -->
          <div id="tab-groups" style="display:none;">
            <div id="groupsList"></div>
          </div>

          <!-- Stats tab -->
          <div id="tab-stats" style="display:none;">
            <div class="stats-filters">
              <div class="field">
                <label>Time Range</label>
                <select id="stats_preset" onchange="onStatsPresetChange()">
                  <option value="1800">Last 30 min</option>
                  <option value="3600">Last 1 hour</option>
                  <option value="10800">Last 3 hours</option>
                  <option value="43200">Last 12 hours</option>
                  <option value="86400" selected>Last 1 day</option>
                  <option value="604800">Last 7 days</option>
                  <option value="custom">Custom</option>
                </select>
              </div>
              <button class="btn-primary btn-sm" onclick="loadStats()">Load</button>
              <button class="btn-ghost btn-sm" onclick="clearStatsFilter()">Reset 24h</button>
            </div>
            <div class="custom-range" id="stats_custom_range">
              <div class="field" style="flex:1"><label>From</label><input type="datetime-local" id="stats_from" /></div>
              <div class="field" style="flex:1"><label>To</label><input type="datetime-local" id="stats_to" /></div>
            </div>
            <div class="card">
              <div id="statsTable"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal: Add Target -->
  <div class="modal-overlay" id="modalAddTarget">
    <div class="modal">
      <div class="modal-header">
        <h3>New Target</h3>
        <button class="btn-ghost btn-icon" onclick="closeModal('modalAddTarget')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-grid">
          <div><label>Name</label><input id="f_name" placeholder="OpenAI Primary" /></div>
          <div><label>Provider</label><input id="f_provider" placeholder="openai" /></div>
          <div>
            <label>API Format</label>
            <select id="f_api_format">
              <option value="openai" selected>openai</option>
              <option value="gemini">gemini</option>
            </select>
          </div>
          <div><label>Base URL</label><input id="f_base_url" placeholder="https://api.openai.com" /></div>
          <div><label>API Key</label><input id="f_api_key" placeholder="sk-..." /></div>
          <div><label>Router Model</label><input id="f_router_model" placeholder="router-default" /></div>
          <div><label>Upstream Model</label><input id="f_upstream_model" placeholder="gpt-4o-mini" /></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modalAddTarget')">Cancel</button>
        <button class="btn-primary" onclick="createTarget()">Create</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Group -->
  <div class="modal-overlay" id="modalAddGroup">
    <div class="modal">
      <div class="modal-header">
        <h3>New Model Group</h3>
        <button class="btn-ghost btn-icon" onclick="closeModal('modalAddGroup')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-grid">
          <div><label>Group Name</label><input id="g_name" placeholder="team-default" /></div>
          <div>
            <label>Enabled</label>
            <select id="g_enabled">
              <option value="true" selected>true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>
        <div style="margin-top:14px;">
          <label>Pick Targets</label>
          <div id="targetPicker" class="picker"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modalAddGroup')">Cancel</button>
        <button class="btn-primary" onclick="createModelGroup()">Create</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toasts"></div>

<script>
  const state = {
    token: localStorage.getItem("admin_token") || "",
    targets: [],
    groups: [],
    statsLoaded: false,
    currentTab: "targets"
  };

  /* ── Helpers ── */
  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function toast(msg, type = "ok") {
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById("toasts").appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function setStatus(id, msg) {
    document.getElementById(id).textContent = msg;
  }

  function setLoginStatus(msg) { setStatus("loginStatus", msg); }
  function setAppStatus(msg) { setStatus("appStatus", msg); }

  function updateView() {
    const loggedIn = Boolean(state.token);
    document.getElementById("loginView").style.display = loggedIn ? "none" : "flex";
    document.getElementById("appView").style.display = loggedIn ? "block" : "none";
  }

  function authHeaders() {
    const headers = { "Content-Type": "application/json" };
    if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
    return headers;
  }

  function openModal(id) { document.getElementById(id).classList.add("open"); }
  function closeModal(id) { document.getElementById(id).classList.remove("open"); }

  function openAddModal() {
    if (state.currentTab === "targets") openModal("modalAddTarget");
    else if (state.currentTab === "groups") openModal("modalAddGroup");
  }

  /* ── Navigation ── */
  const tabTitles = { targets: "Targets", groups: "Model Groups", stats: "Usage Stats" };

  function showTab(name) {
    state.currentTab = name;
    ["targets", "groups", "stats"].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === name ? "" : "none";
    });
    document.querySelectorAll(".nav-item").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === name);
    });
    document.getElementById("topbarTitle").textContent = tabTitles[name] || name;
    document.getElementById("addBtn").style.display = name === "stats" ? "none" : "";
    if (name === "stats" && state.token && !state.statsLoaded) {
      loadStats();
    }
  }

  /* ── Auth ── */
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const res = await fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      setLoginStatus(`Failed: ${data?.error?.message || res.status}`);
      return;
    }
    state.token = data.token;
    localStorage.setItem("admin_token", state.token);
    setLoginStatus(`OK. Expires ${new Date(data.expires_at * 1000).toLocaleString()}`);
    updateView();
    await refreshAll();
  }

  function logout() {
    state.token = "";
    state.statsLoaded = false;
    localStorage.removeItem("admin_token");
    document.getElementById("targetsList").innerHTML = "";
    document.getElementById("groupsList").innerHTML = "";
    document.getElementById("targetPicker").innerHTML = "";
    document.getElementById("statsTable").innerHTML = "";
    setLoginStatus("Signed out");
    updateView();
  }

  /* ── Stats helpers ── */
  function toLocalDatetimeInputValue(date) {
    const pad = n => String(n).padStart(2, "0");
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function setDefaultCustomRange() {
    const end = new Date();
    const start = new Date(end.getTime() - 24 * 60 * 60 * 1000);
    document.getElementById("stats_from").value = toLocalDatetimeInputValue(start);
    document.getElementById("stats_to").value = toLocalDatetimeInputValue(end);
  }

  function onStatsPresetChange() {
    const preset = document.getElementById("stats_preset").value;
    const custom = document.getElementById("stats_custom_range");
    const isCustom = preset === "custom";
    custom.classList.toggle("visible", isCustom);
    if (isCustom) {
      const fromInput = document.getElementById("stats_from");
      const toInput = document.getElementById("stats_to");
      if (!fromInput.value || !toInput.value) setDefaultCustomRange();
    }
  }

  /* ── Data ── */
  async function refreshAll() {
    await refreshTargets();
    await refreshModelGroups();
  }

  async function refreshTargets() {
    if (!state.token) { setLoginStatus("Please login first"); updateView(); return; }
    const res = await fetch("/admin/targets", { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) { toast(`Load targets failed: ${data?.error?.message || res.status}`, "err"); return; }
    state.targets = data.items || [];
    renderTargets(state.targets);
    renderTargetPicker(state.targets);
  }

  async function refreshModelGroups() {
    if (!state.token) { setLoginStatus("Please login first"); updateView(); return; }
    const res = await fetch("/admin/model-groups", { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) { toast(`Load groups failed: ${data?.error?.message || res.status}`, "err"); return; }
    state.groups = data.items || [];
    renderModelGroups(state.groups);
  }

  /* ── Target CRUD ── */
  function readForm() {
    return {
      name: document.getElementById("f_name").value.trim(),
      provider: document.getElementById("f_provider").value.trim(),
      api_format: document.getElementById("f_api_format").value,
      base_url: document.getElementById("f_base_url").value.trim(),
      api_key: document.getElementById("f_api_key").value.trim(),
      router_model: document.getElementById("f_router_model").value.trim(),
      upstream_model: document.getElementById("f_upstream_model").value.trim(),
      enabled: true
    };
  }

  async function createTarget() {
    if (!state.token) return;
    const payload = readForm();
    const res = await fetch("/admin/targets", {
      method: "POST", headers: authHeaders(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) { toast(`Create failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast(`Target created: ${data.id}`);
    closeModal("modalAddTarget");
    await refreshAll();
  }

  function getTargetPayloadByIndex(index) {
    return {
      name: document.getElementById(`t_name_${index}`).value.trim(),
      provider: document.getElementById(`t_provider_${index}`).value.trim(),
      api_format: document.getElementById(`t_api_format_${index}`).value,
      base_url: document.getElementById(`t_base_url_${index}`).value.trim(),
      api_key: document.getElementById(`t_api_key_${index}`).value.trim(),
      router_model: document.getElementById(`t_router_model_${index}`).value.trim(),
      upstream_model: document.getElementById(`t_upstream_model_${index}`).value.trim(),
      enabled: document.getElementById(`t_enabled_${index}`).value === "true"
    };
  }

  async function saveTargetByButton(btn) {
    const id = btn.dataset.id;
    const index = Number(btn.dataset.index);
    const payload = getTargetPayloadByIndex(index);
    const res = await fetch(`/admin/targets/${id}`, {
      method: "PUT", headers: authHeaders(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) { toast(`Update failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast(`Target updated: ${payload.name}`);
    await refreshAll();
  }

  async function deleteTargetByButton(btn) {
    const id = btn.dataset.id;
    if (!confirm("Delete this target?")) return;
    const res = await fetch(`/admin/targets/${id}`, {
      method: "DELETE", headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) { toast(`Delete failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast("Target deleted");
    await refreshAll();
  }

  async function testTargetByButton(btn) {
    const id = btn.dataset.id;
    const card = btn.closest(".item-card");
    const resultEl = card.querySelector(".test-result");
    resultEl.style.display = "block";
    resultEl.style.color = "var(--ink)";
    resultEl.textContent = "Testing...";
    try {
      const res = await fetch(`/admin/test-target/${encodeURIComponent(id)}`, { headers: authHeaders() });
      const data = await res.json();
      if (data.ok) {
        const content = data.response?.choices?.[0]?.message?.content || JSON.stringify(data.response);
        resultEl.textContent = `OK: ${content}`;
        resultEl.style.color = "var(--ok)";
      } else {
        const errMsg = typeof data.error === "string"
          ? data.error
          : (data.error?.error?.message || JSON.stringify(data.error));
        resultEl.textContent = `ERR: ${errMsg}`;
        resultEl.style.color = "var(--danger)";
      }
    } catch (err) {
      resultEl.textContent = `Network error: ${err.message}`;
      resultEl.style.color = "var(--danger)";
    }
  }

  /* ── Group CRUD ── */
  function renderTargetPicker(items) {
    const root = document.getElementById("targetPicker");
    if (!items.length) {
      root.innerHTML = '<div class="mono" style="color:var(--muted);font-size:12px;">Create targets first.</div>';
      return;
    }
    root.innerHTML = items.map(t => `
      <label class="pick-item">
        <input type="checkbox" class="group-target-checkbox" value="${escapeHtml(t.id)}" />
        <span>${escapeHtml(t.name)}</span>
      </label>
    `).join("");
  }

  function readGroupForm() {
    const target_ids = Array.from(document.querySelectorAll(".group-target-checkbox:checked")).map(el => el.value);
    return {
      name: document.getElementById("g_name").value.trim(),
      target_ids,
      enabled: document.getElementById("g_enabled").value === "true"
    };
  }

  async function createModelGroup() {
    if (!state.token) return;
    const payload = readGroupForm();
    const res = await fetch("/admin/model-groups", {
      method: "POST", headers: authHeaders(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) { toast(`Create failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast(`Group created: ${data.name}`);
    closeModal("modalAddGroup");
    await refreshModelGroups();
  }

  function getGroupPayloadByIndex(index) {
    const selected = Array.from(document.querySelectorAll(`.group-edit-target-${index}:checked`)).map(el => el.value);
    return {
      name: document.getElementById(`mg_name_${index}`).value.trim(),
      target_ids: selected,
      enabled: document.getElementById(`mg_enabled_${index}`).value === "true"
    };
  }

  async function saveModelGroupByButton(btn) {
    const id = btn.dataset.id;
    const index = Number(btn.dataset.index);
    const payload = getGroupPayloadByIndex(index);
    const res = await fetch(`/admin/model-groups/${id}`, {
      method: "PUT", headers: authHeaders(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) { toast(`Update failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast(`Group updated: ${payload.name}`);
    await refreshModelGroups();
  }

  async function deleteModelGroupByButton(btn) {
    const id = btn.dataset.id;
    if (!confirm("Delete this model group?")) return;
    const res = await fetch(`/admin/model-groups/${id}`, {
      method: "DELETE", headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) { toast(`Delete failed: ${data?.error?.message || res.status}`, "err"); return; }
    toast("Group deleted");
    await refreshModelGroups();
  }

  /* ── Render ── */
  function renderTargets(items) {
    const root = document.getElementById("targetsList");
    if (!items.length) {
      root.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M8 12h8M12 8v8"/></svg>
          No targets yet. Click Add to create one.
        </div>`;
      return;
    }
    root.innerHTML = items.map((t, index) => `
      <div class="item-card" data-index="${index}">
        <div class="item-header" onclick="toggleCard(this)">
          <svg class="item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          <span class="item-name">${escapeHtml(t.name)}</span>
          <span class="pill ${t.enabled ? "pill-on" : "pill-off"}">${t.enabled ? "ON" : "OFF"}</span>
          <span class="item-id">${escapeHtml(t.id).substring(0,8)}</span>
        </div>
        <div class="item-body">
          <div class="field-grid">
            <div><label>Name</label><input id="t_name_${index}" value="${escapeHtml(t.name)}" /></div>
            <div><label>Provider</label><input id="t_provider_${index}" value="${escapeHtml(t.provider)}" /></div>
            <div>
              <label>API Format</label>
              <select id="t_api_format_${index}">
                <option value="openai" ${(t.api_format || "openai") === "openai" ? "selected" : ""}>openai</option>
                <option value="gemini" ${(t.api_format || "openai") === "gemini" ? "selected" : ""}>gemini</option>
              </select>
            </div>
            <div><label>Base URL</label><input id="t_base_url_${index}" value="${escapeHtml(t.base_url)}" /></div>
            <div><label>API Key</label><input id="t_api_key_${index}" value="${escapeHtml(t.api_key)}" /></div>
            <div><label>Router Model</label><input id="t_router_model_${index}" value="${escapeHtml(t.router_model)}" /></div>
            <div><label>Upstream Model</label><input id="t_upstream_model_${index}" value="${escapeHtml(t.upstream_model)}" /></div>
            <div>
              <label>Enabled</label>
              <select id="t_enabled_${index}">
                <option value="true" ${t.enabled ? "selected" : ""}>true</option>
                <option value="false" ${t.enabled ? "" : "selected"}>false</option>
              </select>
            </div>
          </div>
          <div class="item-actions">
            <button class="btn-primary btn-sm" data-id="${escapeHtml(t.id)}" data-index="${index}" onclick="saveTargetByButton(this)">Save</button>
            <button class="btn-ghost btn-sm" data-id="${escapeHtml(t.id)}" onclick="testTargetByButton(this)">Test</button>
            <button class="btn-danger btn-sm" data-id="${escapeHtml(t.id)}" onclick="deleteTargetByButton(this)">Delete</button>
          </div>
          <div class="test-result"></div>
        </div>
      </div>
    `).join("");

    // Add gap between cards
    root.querySelectorAll('.item-card + .item-card').forEach(el => el.style.marginTop = '8px');
  }

  function toggleCard(header) {
    const card = header.closest(".item-card");
    card.classList.toggle("expanded");
  }

  function renderModelGroups(items) {
    const root = document.getElementById("groupsList");
    if (!items.length) {
      root.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          No model groups yet. Click Add to create one.
        </div>`;
      return;
    }
    root.innerHTML = items.map((g, index) => {
      const options = (state.targets || []).map(t => {
        const checked = (g.target_ids || []).includes(t.id) ? "checked" : "";
        return `
          <label class="pick-item">
            <input type="checkbox" class="group-edit-target-${index}" value="${escapeHtml(t.id)}" ${checked} />
            <span>${escapeHtml(t.name)}</span>
          </label>
        `;
      }).join("");

      return `
      <div class="item-card" data-index="${index}">
        <div class="item-header" onclick="toggleCard(this)">
          <svg class="item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          <span class="item-name">${escapeHtml(g.name)}</span>
          <span class="pill ${g.enabled ? "pill-on" : "pill-off"}">${g.enabled ? "ON" : "OFF"}</span>
          <span class="item-id">${escapeHtml(g.id).substring(0,8)}</span>
        </div>
        <div class="item-body">
          <div class="field-grid">
            <div><label>Group Name</label><input id="mg_name_${index}" value="${escapeHtml(g.name)}" /></div>
            <div>
              <label>Enabled</label>
              <select id="mg_enabled_${index}">
                <option value="true" ${g.enabled ? "selected" : ""}>true</option>
                <option value="false" ${g.enabled ? "" : "selected"}>false</option>
              </select>
            </div>
          </div>
          <div style="margin-top:14px;">
            <label>Members</label>
            <div class="picker">${options || '<div class="mono" style="color:var(--muted);font-size:12px;">No targets available.</div>'}</div>
          </div>
          <div class="item-actions">
            <button class="btn-primary btn-sm" data-id="${escapeHtml(g.id)}" data-index="${index}" onclick="saveModelGroupByButton(this)">Save</button>
            <button class="btn-danger btn-sm" data-id="${escapeHtml(g.id)}" onclick="deleteModelGroupByButton(this)">Delete</button>
          </div>
        </div>
      </div>
      `;
    }).join("");

    root.querySelectorAll('.item-card + .item-card').forEach(el => el.style.marginTop = '8px');
  }

  /* ── Stats ── */
  async function loadStats() {
    if (!state.token) { setLoginStatus("Please login first"); updateView(); return; }
    const preset = document.getElementById("stats_preset").value;
    const params = new URLSearchParams();
    if (preset === "custom") {
      const fromVal = document.getElementById("stats_from").value;
      const toVal = document.getElementById("stats_to").value;
      if (!fromVal || !toVal) { toast("Provide both start and end time.", "err"); return; }
      const fromTs = Math.floor(new Date(fromVal).getTime() / 1000);
      const toTs = Math.floor(new Date(toVal).getTime() / 1000);
      if (Number.isNaN(fromTs) || Number.isNaN(toTs)) { toast("Invalid time range.", "err"); return; }
      if (fromTs > toTs) { toast("Start time after end time.", "err"); return; }
      params.set("from", String(fromTs));
      params.set("to", String(toTs));
    } else {
      const seconds = Number(preset || 86400);
      const toTs = Math.floor(Date.now() / 1000);
      const fromTs = toTs - seconds;
      params.set("from", String(fromTs));
      params.set("to", String(toTs));
    }
    const url = "/admin/stats" + (params.toString() ? "?" + params.toString() : "");
    const res = await fetch(url, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) { toast(`Stats failed: ${data?.error?.message || res.status}`, "err"); return; }
    state.statsLoaded = true;
    renderStats(data.items || []);
  }

  function clearStatsFilter() {
    document.getElementById("stats_preset").value = "86400";
    onStatsPresetChange();
    state.statsLoaded = false;
    loadStats();
  }

  function renderStats(items) {
    const root = document.getElementById("statsTable");
    if (!items.length) {
      root.innerHTML = '<div class="empty" style="padding:24px;">No data for this period.</div>';
      return;
    }
    // Sort by total_tokens descending
    const sorted = [...items].sort((a, b) => (b.total_tokens || 0) - (a.total_tokens || 0));
    const maxTokens = Math.max(...sorted.map(s => s.total_tokens || 0), 1);

    const rows = sorted.map((s, idx) => {
      const pct = ((s.total_tokens || 0) / maxTokens * 100).toFixed(1);
      return `
      <tr class="stats-row">
        <td colspan="8" style="padding:0;border:none;">
          <div class="stats-item">
            <div class="stats-main">
              <span class="stats-rank">#${idx + 1}</span>
              <span class="stats-name">${escapeHtml(s.target_name)}</span>
              <span class="stats-metric">${s.total_calls} calls</span>
              <span class="stats-metric ok">${s.success_count} OK</span>
              <span class="stats-metric err">${s.error_count} Err</span>
              <span class="stats-metric">${s.prompt_tokens} prompt</span>
              <span class="stats-metric">${s.completion_tokens} completion</span>
              <span class="stats-total">${s.total_tokens} tokens</span>
            </div>
            <div class="bar-bg">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </td>
      </tr>
    `}).join("");

    root.innerHTML = `
      <table class="stats-table stats-list">
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  /* ── Boot ── */
  (async function boot() {
    updateView();
    onStatsPresetChange();
    if (!state.token) return;
    await refreshAll();
  })();

  document.getElementById("password").addEventListener("keydown", async (event) => {
    if (event.key === "Enter") await login();
  });

  // Close modal on overlay click
  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) overlay.classList.remove("open");
    });
  });
</script>
</body>
</html>
